<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>架電間空白時間計算ツール</title>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: auto;
}

.top-area {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.total {
    flex: 1;
    font-size: 26px;
    text-align: center;
    background: #fff;
    padding: 20px;
    border-radius: 16px;
}

.list {
    width: 350px;
    background: #fff;
    padding: 10px;
    border-radius: 16px;
}

.copy-btn {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border: none;
    border-radius: 8px;
    background: #0071e3;
    color: #fff;
    cursor: pointer;
}

#blankList {
    font-size: 12px;
    white-space: pre-wrap;
    max-height: 150px;
    overflow-y: auto;
}

table {
    width: 100%;
    background: #fff;
    border-radius: 16px;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

input {
    width: 100%;
    padding: 6px;
    text-align: center;
}
</style>
</head>

<body>
<div class="container">

<div class="top-area">
    <div class="total" id="totalTime">合計: 00:00:00</div>

    <div class="list">
        <button class="copy-btn" onclick="copyList()">コピー</button>
        <div id="blankList"></div>
    </div>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>開始</th>
<th>時間</th>
<th>次</th>
<th>空白</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

</div>

<script>
// フォーマット
function formatInput(v, type) {
    let n = v.replace(/\D/g,"");

    if(type==="time"){
        if(n.length>6)n=n.slice(0,6);
        if(n.length>=5)return n.replace(/(\d{2})(\d{2})(\d{0,2})/,"$1:$2:$3");
        if(n.length>=3)return n.replace(/(\d{2})(\d{0,2})/,"$1:$2");
        return n;
    }

    if(type==="dur"){
        if(n.length>4)n=n.slice(0,4);
        if(n.length>=3)return n.replace(/(\d{2})(\d{0,2})/,"$1:$2");
        return n;
    }

    return v;
}

// 秒変換
function sec(t, d=false){
    if(!t)return 0;
    let p=t.split(":").map(Number);
    return d ? p[0]*60+(p[1]||0) : p[0]*3600+p[1]*60+(p[2]||0);
}

// 表示
function fmt(s){
    if(s<0)return "00:00:00";
    let h=Math.floor(s/3600);
    let m=Math.floor((s%3600)/60);
    let sec=s%60;
    return [h,m,sec].map(x=>String(x).padStart(2,"0")).join(":");
}

// 計算
function calc(){
    let total=0;
    let lines=[];

    for(let i=0;i<100;i++){
        let s=document.getElementById(`s${i}`);
        let d=document.getElementById(`d${i}`);
        let n=document.getElementById(`n${i}`);

        let start=sec(s.value);
        let dur=sec(d.value,true);
        let next=sec(n.value);

        let end=start+dur;
        let blank=next-end;

        if(blank>0){
            total+=blank;

            lines.push(
`${s.value} + ${d.value} ～ ${n.value} → ${fmt(blank)}`
            );
        }

        document.getElementById(`r${i}`).innerText=fmt(blank);
    }

    document.getElementById("totalTime").innerText="合計: "+fmt(total);
    document.getElementById("blankList").innerText=lines.join("\n");
}

// コピー
function copyList(){
    let text=document.getElementById("blankList").innerText;
    navigator.clipboard.writeText(text);
    alert("コピーしました");
}

// 行生成
let tb=document.getElementById("rows");

for(let i=0;i<100;i++){
    let tr=document.createElement("tr");
    tr.innerHTML=`
<td>${i+1}</td>
<td><input id="s${i}" oninput="this.value=formatInput(this.value,'time');calc()"></td>
<td><input id="d${i}" oninput="this.value=formatInput(this.value,'dur');calc()"></td>
<td><input id="n${i}" oninput="this.value=formatInput(this.value,'time');calc()"></td>
<td id="r${i}">00:00:00</td>
`;
    tb.appendChild(tr);
}
</script>

</body>
</html>
