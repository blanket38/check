<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>架電間空白時間計算ツール</title>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 20px;
    color: #1d1d1f;
}

.container {
    max-width: 1400px;
    margin: auto;
}

h1 {
    text-align: center;
    font-weight: 500;
}

.top-area {
    display: flex;
    gap: 20px;
    margin: 20px 0;
}

.total {
    flex: 1;
    font-size: 26px;
    font-weight: 600;
    text-align: center;
    background: #fff;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.list {
    width: 250px;
    background: #fff;
    padding: 15px;
    border-radius: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    font-size: 13px;
    overflow-y: auto;
    max-height: 120px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

th, td {
    padding: 8px;
    text-align: center;
    border-bottom: 1px solid #e5e5e7;
}

th {
    background: #f0f0f3;
}

input {
    width: 100%;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid #d2d2d7;
    text-align: center;
    background: #fafafa;
}

.result {
    font-weight: 500;
}
</style>
</head>

<body>
<div class="container">
    <h1>架電間 空白時間計算</h1>

    <div class="top-area">
        <div class="total" id="totalTime">合計: 00:00:00</div>
        <div class="list" id="blankList">空白一覧</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>架電開始</th>
                <th>架電時間（MM:SS）</th>
                <th>次の開始</th>
                <th>空白時間</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</div>

<script>
// ===== 自動フォーマット =====
function formatInput(value, type) {
    let nums = value.replace(/\D/g, "");

    if (type === "time") {
        if (nums.length > 6) nums = nums.slice(0,6);
        if (nums.length >= 5)
            return nums.replace(/(\d{2})(\d{2})(\d{0,2})/, "$1:$2:$3");
        if (nums.length >= 3)
            return nums.replace(/(\d{2})(\d{0,2})/, "$1:$2");
        return nums;
    }

    if (type === "duration") {
        if (nums.length > 4) nums = nums.slice(0,4);
        if (nums.length >= 3)
            return nums.replace(/(\d{2})(\d{0,2})/, "$1:$2");
        return nums;
    }

    return value;
}

// 秒変換
function toSeconds(time, isDuration=false) {
    if (!time) return 0;
    let p = time.split(":").map(Number);

    if (isDuration) return p[0]*60 + (p[1]||0);
    return p[0]*3600 + p[1]*60 + (p[2]||0);
}

// 表示
function format(sec) {
    if (sec < 0) return "00:00:00";
    let h = Math.floor(sec/3600);
    let m = Math.floor((sec%3600)/60);
    let s = sec%60;
    return [h,m,s].map(v=>String(v).padStart(2,"0")).join(":");
}

// 計算
function calculate() {
    let total = 0;
    let list = [];

    for (let i=0;i<100;i++) {
        let s = document.getElementById(`start-${i}`);
        let d = document.getElementById(`duration-${i}`);
        let n = document.getElementById(`next-${i}`);

        let start = toSeconds(s.value);
        let duration = toSeconds(d.value, true);
        let next = toSeconds(n.value);

        let blank = next - (start + duration);

        if (blank > 0) {
            total += blank;
            list.push(format(blank));
        }

        document.getElementById(`result-${i}`).innerText = format(blank);
    }

    document.getElementById("totalTime").innerText = "合計: " + format(total);
    document.getElementById("blankList").innerText = list.join("\n");
}

// 行生成
let tbody = document.getElementById("rows");

for (let i=0;i<100;i++) {
    let tr = document.createElement("tr");

    tr.innerHTML = `
        <td>${i+1}</td>
        <td><input id="start-${i}" oninput="this.value=formatInput(this.value,'time');calculate()" placeholder="000000"></td>
        <td><input id="duration-${i}" oninput="this.value=formatInput(this.value,'duration');calculate()" placeholder="0000"></td>
        <td><input id="next-${i}" oninput="this.value=formatInput(this.value,'time');calculate()" placeholder="000000"></td>
        <td class="result" id="result-${i}">00:00:00</td>
    `;

    tbody.appendChild(tr);
}
</script>
</body>
</html>
