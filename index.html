<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>架電間空白時間計算</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 30px;
    color: #1d1d1f;
}

.container {
    max-width: 1300px;
    margin: auto;
}

h1 {
    text-align: center;
    font-weight: 500;
    margin-bottom: 30px;
}

.top {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
}

.card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.total {
    flex: 1;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    padding: 25px;
}

.side {
    width: 360px;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.copy-btn {
    padding: 10px;
    border-radius: 12px;
    border: none;
    background: #0071e3;
    color: #fff;
    cursor: pointer;
    margin-bottom: 10px;
}

#list {
    font-size: 13px;
    white-space: pre-wrap;
    overflow-y: auto;
    max-height: 180px;
}

table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 20px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

th {
    background: #f2f2f5;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

input {
    width: 100%;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid #d2d2d7;
    text-align: center;
}
</style>
</head>

<body>
<div class="container">

<h1>架電間 空白時間計算</h1>

<div class="top">
    <div class="card total" id="total">合計: 00:00:00</div>
    <div class="card side">
        <button class="copy-btn" onclick="copyList()">コピー</button>
        <div id="list"></div>
    </div>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>開始</th>
<th>時間</th>
<th>次</th>
<th>空白</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

</div>

<script>
// ===== フォーマット =====
function formatInput(v,type){
    let n=v.replace(/\D/g,"");

    if(type==="time"){
        if(n.length>6)n=n.slice(0,6);
        if(n.length>=5)return n.replace(/(\d{2})(\d{2})(\d{0,2})/,"$1:$2:$3");
        if(n.length>=3)return n.replace(/(\d{2})(\d{0,2})/,"$1:$2");
        return n;
    }

    if(type==="dur"){
        if(n.length>4)n=n.slice(0,4);
        if(n.length>=3)return n.replace(/(\d{2})(\d{0,2})/,"$1:$2");
        return n;
    }

    return v;
}

// 秒変換
function sec(t,d=false){
    if(!t)return 0;
    let p=t.split(":").map(Number);
    return d ? p[0]*60+(p[1]||0) : p[0]*3600+p[1]*60+(p[2]||0);
}

// 表示
function fmt(s){
    if(s<0)return "00:00:00";
    let h=Math.floor(s/3600);
    let m=Math.floor((s%3600)/60);
    let sec=s%60;
    return [h,m,sec].map(x=>String(x).padStart(2,"0")).join(":");
}

// 計算
function calc(){
    let total=0;
    let lines=[];

    for(let i=0;i<100;i++){
        let s=document.getElementById(`s${i}`);
        let d=document.getElementById(`d${i}`);
        let n=document.getElementById(`n${i}`);

        let start=sec(s.value);
        let dur=sec(d.value,true);
        let next=sec(n.value);

        let end=start+dur;
        let blank=next-end;

        if(blank>0){
            total+=blank;
            lines.push(`${fmt(end)}～${n.value} → ${fmt(blank)}`);
        }

        document.getElementById(`r${i}`).innerText=fmt(blank);
    }

    document.getElementById("total").innerText="合計: "+fmt(total);
    document.getElementById("list").innerText=lines.join("\n");
}

// ===== Enter移動 =====
function handleEnter(e, row, col){
    if(e.key === "Enter"){
        e.preventDefault();

        let nextCol = col + 1;
        let nextRow = row;

        if(nextCol > 2){
            nextCol = 0;
            nextRow = row + 1;
        }

        let nextId = ["s","d","n"][nextCol] + nextRow;
        let el = document.getElementById(nextId);

        if(el){
            el.focus();
        }
    }
}

// コピー
function copyList(){
    navigator.clipboard.writeText(
        document.getElementById("list").innerText
    );
}

// 行生成
let tb=document.getElementById("rows");

for(let i=0;i<100;i++){
    let tr=document.createElement("tr");

    tr.innerHTML=`
<td>${i+1}</td>
<td><input id="s${i}" onkeydown="handleEnter(event,${i},0)" oninput="this.value=formatInput(this.value,'time');calc()"></td>
<td><input id="d${i}" onkeydown="handleEnter(event,${i},1)" oninput="this.value=formatInput(this.value,'dur');calc()"></td>
<td><input id="n${i}" onkeydown="handleEnter(event,${i},2)" oninput="this.value=formatInput(this.value,'time');calc()"></td>
<td id="r${i}">00:00:00</td>
`;

    tb.appendChild(tr);
}
</script>

</body>
</html>
